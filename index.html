<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chloe Moore's Website</title>
  
  <style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  }

  body {
    padding-top: 100px; /* Space for the fixed navbar */
    text-align: center;
    background-color: #0b2545; /* Dark blue background */
    color: #eeffff;            /* White text color */
    min-height: 100vh;
  }

  /* Navbar container */
  .navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background-color: #0b2545; 
    padding: 1.2rem 2rem;
    position: fixed; 
    top: 0;
    left: 0;
    width: 100%;
    z-index: 1000;
    border-bottom: 4px solid #eef4f8; 
    box-shadow: 0 4px 12px rgba(11, 37, 69, 0.15);
  }

  .logo {
    color: #8da9c4; 
    font-size: 1.6rem;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
  }

  .nav-links {
    display: flex;
    list-style: none;
  }

  .nav-links li {
    margin-left: 2rem;
  }

  .nav-links a {
    color: #eeffff; 
    text-decoration: none;
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: 0.5px;
    position: relative;
    padding: 0.5rem 0;
    transition: color 0.3s ease;
  }

  .nav-links a:hover,
  .nav-links a.active {
    color: #13b1a4; 
  }

  .nav-links a::after {
    content: '';
    position: absolute;
    width: 0;
    height: 3px;
    bottom: 0;
    left: 0;
    background-color: #13b1a4;
    transition: width 0.3s ease;
    border-radius: 2px;
  }

  .nav-links a:hover::after,
  .nav-links a.active::after {
    width: 100%;
  }

  /* Main Content Layout */
  main {
    max-width: 800px;
    margin: 2rem auto;
    padding: 0 1rem;
  }

  h2 {
    margin-bottom: 1.5rem;
    font-size: 2rem;
  }

  .hero-img {
    max-width: 100%;
    height: auto;
    border-radius: 8px;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
  }

  /* Responsive Mobile Settings */
  @media (max-width: 650px) {
    body {
      padding-top: 140px; /* Extra space for taller mobile menu */
    }
    
    .navbar {
      flex-direction: column;
      gap: 1.2rem;
      padding: 1rem;
    }
    
    .nav-links {
      width: 100%;
      justify-content: space-around;
    }
    
    .nav-links li {
      margin-left: 0;
    }
    
    .nav-links a::after {
      display: none; 
    }
  }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="logo">🌊 DeepBlue</div>
    <ul class="nav-links">
      <li><a href="index.html" class="active">Home</a></li>
      <li><a href="reefs.html">The Reefs</a></li>
    </ul>
  </nav>

  <main>
    <h2>Chloe Moore's Website</h2>
    <img src="https://coralvita.co/wp-content/uploads/2025/05/Coral-Reef-Fish.webp" alt="Coral Reef Fish" class="hero-img">
  </main>
  
</body>
</html>
